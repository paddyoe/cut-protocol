<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;-webkit-tap-highlight-color:transparent}
.root{max-width:720px;margin:0 auto;padding:20px;min-height:100vh;padding-bottom:env(safe-area-inset-bottom,20px)}

/* Mode toggle */

.mode-btn.shred{background:#1f0a0a;color:#e74c3c}
.mode-btn.shred.active{background:#e74c3c;color:#fff}
.mode-btn.bulk{background:#0a1f0a;color:#2ecc71}

.header{border-bottom:2px solid #333;padding-bottom:14px;margin-bottom:20px}

.status-bar{background:#111;border:1px solid #222;padding:10px 18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.tag{font-size:10px;padding:3px 8px;font-weight:700;font-family:inherit;border-radius:2px;display:inline-block}
.tag-ok{background:#0a1f0a;border:1px solid #2ecc71;color:#2ecc71}
.tag-warn{background:#1f1a0a;border:1px solid #f39c12;color:#f39c12}
.tag-cut{background:#1f0a0a;border:1px solid #e74c3c;color:#e74c3c}
.tag-add{background:#0a1a1f;border:1px solid #3498db;color:#3498db}

.cp{color:#e74c3c}.cf{color:#f39c12}.ck{color:#3498db}

.history h2{font-size:14px;font-weight:700;color:#fff;text-transform:uppercase;margin:0 0 12px}
.hl{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.hi{font-size:11px;color:#666;border-bottom:1px solid #151515}
.hi-head{display:flex;justify-content:space-between;padding:6px 0;cursor:pointer}

.hi-day .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.footer{display:flex;justify-content:space-between;align-items:center;margin-top:24px;border-top:1px solid #1a1a1a;padding-top:12px}
.footer .fr{font-size:10px;color:#333}
.footer button{background:none;border:none;color:#2a2a2a;font-size:10px;font-family:inherit;cursor:pointer;padding:4px 8px}
.reset-progress{background:#111;border:1px solid #333;color:#555;padding:8px 16px;font-size:11px;font-family:inherit;cursor:pointer;text-transform:uppercase;font-weight:700;width:100%;margin-top:8px;margin-bottom:10px}
.reset-progress:active{background:#1a1a1a}

.manual-adj .ma-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.5px}
.manual-adj .ma-btns{display:flex;gap:6px;align-items:center}
.manual-adj .ma-btn{background:#1a1a1a;border:1px solid #333;color:#888;padding:6px 14px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:700}
.manual-adj .ma-btn:active{background:#222}
.manual-adj .ma-btn.disabled{opacity:.25;cursor:not-allowed}
.manual-adj .ma-btn.minus{color:#e74c3c;border-color:#3a1a1a}
.manual-adj .ma-btn.plus{color:#3498db;border-color:#1a2a3a}
.manual-adj .ma-preview{font-size:9px;color:#444;margin-top:4px;width:100%}
</style>
</head>
<body>
<div class="root" id="app"></div>

<script>
// ─── IndexedDB ──────────────────────────────────────────
const DB='CutProtocolDB';
function openDB(){return new Promise((r,j)=>{const q=indexedDB.open(DB,1);q.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains('kv'))e.target.result.createObjectStore('kv')};q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
async function dbGet(k){const db=await openDB();return new Promise((r,j)=>{const t=db.transaction('kv','readonly').objectStore('kv').get(k);t.onsuccess=()=>r(t.result??null);t.onerror=()=>j(t.error)})}
async function dbSet(k,v){const db=await openDB();return new Promise((r,j)=>{const t=db.transaction('kv','readwrite').objectStore('kv').put(v,k);t.onsuccess=()=>r();t.onerror=()=>j(t.error)})}
async function dbDel(k){const db=await openDB();return new Promise((r,j)=>{const t=db.transaction('kv','readwrite').objectStore('kv').delete(k);t.onsuccess=()=>r();t.onerror=()=>j(t.error)})}

// ─── CONFIG ─────────────────────────────────────────────
const GOAL_KG=77,DEADLINE=new Date('2026-08-04');
const CARB_STEP=20; // grams per AUTO adjustment
const MANUAL_STEP=30; // grams per MANUAL ad-hoc adjustment
const SHRED_TARGET=-0.5; // kg per iteration
const BULK_MIN=0.15,BULK_MAX=0.35; // kg per iteration

// ─── FOOD DATA ──────────────────────────────────────────
const PROTEIN_A=[
  {food:"Hähnchenbrust",amt:250,unit:"g (roh)",p:55,f:5,k:0,kcal:275},
  {food:"Putenbrust",amt:250,unit:"g (roh)",p:55,f:3,k:0,kcal:250},
  {food:"Thunfisch (Dose)",amt:250,unit:"g",p:55,f:2,k:0,kcal:250}
];
const PROTEIN_B=[
  {food:"Lachs",amt:180,unit:"g (roh)",p:36,f:24,k:0,kcal:370},
  {food:"Forelle",amt:180,unit:"g (roh)",p:36,f:14,k:0,kcal:280},
  {food:"Kabeljau",amt:200,unit:"g (roh)",p:36,f:2,k:0,kcal:165}
];
const CARB_BASE=[
  {food:"Reis",baseAmt:60,unit:"g (roh)",pG:.07,fG:.01,kG:.78,kcG:3.58},
  {food:"Nudeln",baseAmt:60,unit:"g (roh)",pG:.11,fG:.02,kG:.69,kcG:3.56},
  {food:"Kartoffeln",baseAmt:200,unit:"g",pG:.02,fG:.001,kG:.15,kcG:.73}
];
const FAT_OPT=[
  {food:"Olivenöl",amt:10,unit:"ml",p:0,f:10,k:0,kcal:90},
  {food:"Kokosöl",amt:10,unit:"ml",p:0,f:10,k:0,kcal:90},
  {food:"Butter",amt:10,unit:"g",p:0,f:8,k:0,kcal:75}
];
const FIXED=[
  {name:"Porridge",items:[
    {food:"Haferflocken",amt:50,unit:"g"},{food:"Whey Protein",amt:50,unit:"g"},
    {food:"Obst",amt:100,unit:"g"},{food:"Lindt 85%",amt:15,unit:"g"},
    {food:"Flohsamenschalen",amt:4,unit:"g"},{food:"Mandelmilch",amt:200,unit:"ml"}
  ],macros:{kcal:552,p:49,f:14,k:54}},
  {name:"Skyr Bowl",items:[
    {food:"Skyr",amt:400,unit:"g"},{food:"Apfel",amt:1,unit:"Stück"},
    {food:"Leinsamen",amt:10,unit:"g"},{food:"Paranuss",amt:10,unit:"g"}
  ],macros:{kcal:474,p:48,f:12,k:41}}
];
const VEG3={food:"Brokkoli",amt:200,unit:"g",p:6,f:0,k:4,kcal:35};
const VEG4={food:"Grüne Bohnen",amt:200,unit:"g",p:4,f:0,k:6,kcal:40};

// ─── STATE ──────────────────────────────────────────────
const DEFAULT_STATE=()=>({
  mode:'shred', // 'shred' or 'bulk'
  iteration:1,
  checks:Array.from({length:5},()=>Array(4).fill(false)),
  weights:Array(6).fill(""),
  recovery:Array(5).fill(""),
  note:"",
  history:[],
  swapPA:0,swapPB:0,swapCA:0,swapCB:2,swapFA:0,swapFB:0,
  carbAdj:0, // positive = added, negative = removed (in grams, cumulative)
  stallCount:0,
  consecutiveOk:0,
  showShop:false,
  expandedIter:null
});
let S=DEFAULT_STATE();
let saveTimer=null;
function scheduleSave(){if(saveTimer)clearTimeout(saveTimer);saveTimer=setTimeout(()=>dbSet('state',S).catch(()=>{}),300)}

// ─── HELPERS ────────────────────────────────────────────
function getCarb(idx,adj){
  const c=CARB_BASE[idx],amt=Math.max(0,c.baseAmt+adj);
  return{food:c.food,amt:Math.round(amt),unit:c.unit,p:Math.round(amt*c.pG),f:Math.round(amt*c.fG),k:Math.round(amt*c.kG),kcal:Math.round(amt*c.kcG)};
}
function mSum(...ii){return ii.reduce((a,b)=>({kcal:a.kcal+b.kcal,p:a.p+b.p,f:a.f+b.f,k:a.k+b.k}),{kcal:0,p:0,f:0,k:0})}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function dd(a,b){const x=parseFloat(a),y=parseFloat(b);return(!isNaN(x)&&!isNaN(y))?(y-x).toFixed(1):null}
function getTotals(){
  const cA=getCarb(S.swapCA,S.carbAdj),cB=getCarb(S.swapCB,S.carbAdj);
  const m3=mSum(PROTEIN_A[S.swapPA],cA,VEG3,FAT_OPT[S.swapFA]);
  const m4=mSum(PROTEIN_B[S.swapPB],cB,VEG4,FAT_OPT[S.swapFB]);
  return[FIXED[0].macros,FIXED[1].macros,m3,m4].reduce((a,m)=>({kcal:a.kcal+m.kcal,p:a.p+m.p,f:a.f+m.f,k:a.k+m.k}),{kcal:0,p:0,f:0,k:0});
}

// ─── MANUAL AD-HOC CARB ADJUSTMENT ─────────────────────
// Applies ±MANUAL_STEP (30g) to carbAdj, affecting only the 2 adjustable
// meals (Deftig I & II). Protein and fat remain untouched.
// Validates that no carb source goes below 0g.

/**
 * Check if reducing by MANUAL_STEP is safe for both carb sources.
 * Returns true if both sources would remain ≥ 0g after reduction.
 */
function canManualReduce(){
  return [S.swapCA,S.swapCB].every(idx=>
    CARB_BASE[idx].baseAmt+(S.carbAdj-MANUAL_STEP)>=0
  );
}

/**
 * Preview what a manual adjustment would look like.
 * @param {number} dir — +1 to add, -1 to remove
 * @returns {object} {lines, oldKcal, newKcal, oldCarbs, newCarbs, blocked}
 */
function previewManualAdj(dir){
  const step=dir*MANUAL_STEP;
  const newAdj=S.carbAdj+step;
  // Block if any source would go negative
  const blocked=[S.swapCA,S.swapCB].some(idx=>CARB_BASE[idx].baseAmt+newAdj<0);
  const lines=[];
  [S.swapCA,S.swapCB].forEach((idx,i)=>{
    const c=CARB_BASE[idx];
    const oldAmt=Math.max(0,Math.round(c.baseAmt+S.carbAdj));
    const newAmt=Math.max(0,Math.round(c.baseAmt+newAdj));
    lines.push({label:i===0?'Deftig I':'Deftig II',food:c.food,oldAmt,newAmt,unit:c.unit});
  });
  const oldTot=getTotals();
  const saved=S.carbAdj;S.carbAdj=newAdj;
  const newTot=getTotals();S.carbAdj=saved;
  return{lines,oldKcal:oldTot.kcal,newKcal:newTot.kcal,oldCarbs:oldTot.k,newCarbs:newTot.k,blocked};
}

/**
 * Apply a manual ad-hoc carb adjustment.
 * @param {number} dir — +1 to add 30g, -1 to remove 30g
 * Does NOT reset stallCount or consecutiveOk — this is purely manual.
 * The auto-algorithm continues independently on next iteration close.
 */
function manualAdj(dir){
  if(dir<0&&!canManualReduce()){return} // safety: no negative carbs
  S.carbAdj+=dir*MANUAL_STEP;
  scheduleSave();
  render();
}

// ─── CONCRETE RECOMMENDATION ────────────────────────────
function getRecommendation(direction){
  // direction: -1 = reduce carbs, +1 = increase carbs
  const step=direction*CARB_STEP;
  const newAdj=S.carbAdj+step;
  const lines=[];
  [S.swapCA,S.swapCB].forEach((idx,i)=>{
    const c=CARB_BASE[idx];
    const oldAmt=Math.max(0,Math.round(c.baseAmt+S.carbAdj));
    const newAmt=Math.max(0,Math.round(c.baseAmt+newAdj));
    const label=i===0?'Deftig I':'Deftig II';
    lines.push({label,food:c.food,oldAmt,newAmt,unit:c.unit});
  });
  const oldTot=getTotals();
  const savedAdj=S.carbAdj;
  S.carbAdj=newAdj;
  const newTot=getTotals();
  S.carbAdj=savedAdj;
  return{lines,oldKcal:oldTot.kcal,newKcal:newTot.kcal,oldCarbs:oldTot.k,newCarbs:newTot.k,step};
}

// ─── PROJECTION ─────────────────────────────────────────
function getProjection(){
  const pts=[];let dayIdx=0;
  S.history.forEach(h=>{(h.weights||[]).forEach(w=>{const v=parseFloat(w);if(!isNaN(v))pts.push({x:dayIdx,y:v});dayIdx++})});
  S.weights.forEach(w=>{const v=parseFloat(w);if(!isNaN(v))pts.push({x:dayIdx,y:v});dayIdx++});
  if(pts.length<3)return null;
  const n=pts.length,sx=pts.reduce((a,p)=>a+p.x,0),sy=pts.reduce((a,p)=>a+p.y,0);
  const sxy=pts.reduce((a,p)=>a+p.x*p.y,0),sxx=pts.reduce((a,p)=>a+p.x*p.x,0);
  const slope=(n*sxy-sx*sy)/(n*sxx-sx*sx),intercept=(sy-slope*sx)/n;
  if(S.mode==='shred'&&slope>=0)return{msg:"Kein Abwärtstrend.",date:null};
  if(S.mode==='bulk'&&slope<=0)return{msg:"Kein Aufwärtstrend.",date:null};
  const lastPt=pts[pts.length-1];
  const target=S.mode==='shred'?GOAL_KG:null;
  if(!target)return{msg:`Trend: ${(slope*7).toFixed(2)} kg/Woche`,rate:slope*7,currentW:lastPt.y,date:null};
  const dToGoal=(target-intercept)/slope-lastPt.x;
  const projDate=new Date(Date.now()+dToGoal*864e5);
  return{date:projDate,daysLeft:Math.round(dToGoal),onTime:projDate<=DEADLINE,rate:slope*7,currentW:lastPt.y,deadlineDays:Math.ceil((DEADLINE-Date.now())/864e5)};
}

// ─── WHOOP CORRELATION ──────────────────────────────────
function getCorr(){
  const valid=S.history.filter(h=>h.recovery&&h.recovery.some(r=>r!==''&&r!==null));
  if(valid.length<3)return null;
  const data=valid.map(h=>{const recs=h.recovery.map(Number).filter(n=>!isNaN(n));const avg=recs.length?recs.reduce((a,b)=>a+b,0)/recs.length:null;return{avg,d:h.delta!==null?parseFloat(h.delta):null}}).filter(d=>d.avg!==null&&d.d!==null);
  if(data.length<3)return null;
  const low=data.filter(d=>d.avg<50),high=data.filter(d=>d.avg>=50);
  const aLoss=d=>d.length?d.reduce((a,x)=>a+x.d,0)/d.length:0;
  return{lowAvg:aLoss(low),highAvg:aLoss(high),avgAll:data.reduce((a,d)=>a+d.avg,0)/data.length,stallsLow:data.filter(d=>d.d>SHRED_TARGET&&d.avg<50).length,totalStalls:data.filter(d=>d.d>SHRED_TARGET).length,lc:low.length,hc:high.length};
}

// ─── REFEED ─────────────────────────────────────────────
function shouldRefeed(){
  if(S.mode!=='shred')return null;
  if(S.consecutiveOk>=4)return{msg:`${S.consecutiveOk} Iterationen im Defizit. Strategischer Refeed: 1 Tag Carbs +100g, Fett −20g, ~2600 kcal Maintenance.`};
  const l2=S.history.slice(-2);
  if(l2.length===2&&l2.every(h=>h.adherence<60))return{msg:'2× Adherence unter 60%. Refeed-Tag als Reset: 1 Tag Maintenance, dann weiter.'};
  return null;
}

// ─── RENDER ─────────────────────────────────────────────
function render(){
  const isShred=S.mode==='shred';
  const pA=PROTEIN_A[S.swapPA],pB=PROTEIN_B[S.swapPB];
  const cA=getCarb(S.swapCA,S.carbAdj),cB=getCarb(S.swapCB,S.carbAdj);
  const fA=FAT_OPT[S.swapFA],fB=FAT_OPT[S.swapFB];
  const m3=mSum(pA,cA,VEG3,fA),m4=mSum(pB,cB,VEG4,fB);
  const meals=[
    {...FIXED[0],di:FIXED[0].items.map(i=>({food:i.food,display:`${i.amt}${i.unit}`}))},
    {...FIXED[1],di:FIXED[1].items.map(i=>({food:i.food,display:`${i.amt}${i.unit}`}))},
    {name:"Deftig I",macros:m3,di:[
      {food:pA.food,display:`${pA.amt}${pA.unit}`,sw:"pA"},
      {food:cA.food,display:`${cA.amt}${cA.unit}`,sw:"cA"},
      {food:VEG3.food,display:`${VEG3.amt}${VEG3.unit}`},
      {food:fA.food,display:`${fA.amt}${fA.unit}`,sw:"fA"}]},
    {name:"Deftig II",macros:m4,di:[
      {food:pB.food,display:`${pB.amt}${pB.unit}`,sw:"pB"},
      {food:cB.food,display:`${cB.amt}${cB.unit}`,sw:"cB"},
      {food:VEG4.food,display:`${VEG4.amt}${VEG4.unit}`},
      {food:fB.food,display:`${fB.amt}${fB.unit}`,sw:"fB"}]}
  ];
  const tot=meals.reduce((a,m)=>({kcal:a.kcal+m.macros.kcal,p:a.p+m.macros.p,f:a.f+m.macros.f,k:a.k+m.macros.k}),{kcal:0,p:0,f:0,k:0});
  const sW=parseFloat(S.weights[0]),eW=parseFloat(S.weights[5]);
  const delta=(!isNaN(sW)&&!isNaN(eW))?(eW-sW).toFixed(1):null;
  const dv=delta!==null?parseFloat(delta):null;
  const adh=Math.round(S.checks.flat().filter(Boolean).length/20*100);

  // Determine evaluation
  let evalType,evalMsg,recDir=0;
  if(delta===null){evalType='none'}
  else if(isShred){
    if(dv<=SHRED_TARGET){evalType='ok';evalMsg=`${delta} kg — on track.`}
    else if(S.stallCount>=1){evalType='cut';evalMsg=`${delta} kg — 2. Stall. Carbs werden reduziert.`;recDir=-1}
    else{evalType='wait';evalMsg=`${delta} kg — 1. Stall. Nächste Iteration abwarten.`}
  } else { // bulk
    if(dv>=BULK_MIN&&dv<=BULK_MAX){evalType='ok';evalMsg=`+${delta} kg — Sweet Spot.`}
    else if(dv>BULK_MAX){
      if(S.stallCount>=1){evalType='cut';evalMsg=`+${delta} kg — 2× zu schnell. Carbs reduzieren.`;recDir=-1}
      else{evalType='wait';evalMsg=`+${delta} kg — etwas zu schnell. Abwarten.`}
    } else {
      if(S.stallCount>=1){evalType='add';evalMsg=`${dv>0?'+':''}${delta} kg — 2× zu wenig. Carbs erhöhen.`;recDir=1}
      else{evalType='wait';evalMsg=`${dv>0?'+':''}${delta} kg — zu wenig Zunahme. Abwarten.`}
    }
  }

  const modeCol=isShred?'#e74c3c':'#2ecc71';

  let h=`
  <div class="mode-bar">
    <button class="mode-btn shred${isShred?' active':''}" onclick="setMode('shred')">🔥 Shred</button>
    <button class="mode-btn bulk${!isShred?' active':''}" onclick="setMode('bulk')">💪 Bulk</button>
  </div>

  <div class="header"><h1>CUT PROTOCOL</h1><span class="iter">#${S.iteration}</span>
    <div class="meta">
      <span style="color:${modeCol};font-weight:700">${isShred?'SHRED':'BULK'}</span>
      <span>${isShred?'→ '+GOAL_KG+'kg':'Lean Gains'}</span>
      <span>Deadline 04.08.2026</span>
    </div></div>

  <div class="totals">
    ${[['kcal',tot.kcal,'#fff'],['Protein',tot.p+'g','#e74c3c'],['Fett',tot.f+'g','#f39c12'],['Carbs',tot.k+'g','#3498db']].map(([l,v,c])=>`<div class="t"><div class="tv" style="color:${c}">${v}</div><div class="tl">${l}</div></div>`).join('')}
  </div>

  <div class="status-bar">
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      ${S.carbAdj===0?'<span class="tag tag-ok">BASE</span>':S.carbAdj<0?`<span class="tag tag-cut">${S.carbAdj}g</span>`:`<span class="tag tag-add">+${S.carbAdj}g</span>`}
      ${S.stallCount>0?`<span class="tag tag-warn">STALL ${S.stallCount}/2</span>`:''}
      ${S.consecutiveOk>=3&&isShred?`<span class="tag tag-ok">🔥 ${S.consecutiveOk}</span>`:''}
    </div>
    <span style="font-size:10px;color:#444">${cA.food} ${cA.amt}${cA.unit} · ${cB.food} ${cB.amt}${cB.unit}</span>
  </div>`;

  // ─── MANUAL CARB ADJUSTMENT ──────────────────────────
  // Ad-hoc ±30g control, independent of auto-algorithm.
  // Only affects Deftig I & II (the 2 adjustable meals).
  const canReduce=canManualReduce();
  const previewMinus=canReduce?previewManualAdj(-1):null;
  const previewPlus=previewManualAdj(1);
  h+=`<div class="manual-adj">
    <div>
      <div class="ma-label">Manuelle Carb-Anpassung (±${MANUAL_STEP}g/Quelle)</div>
      <div class="ma-preview">
        ${canReduce&&previewMinus?`−${MANUAL_STEP}g → ${previewMinus.newKcal} kcal / ${previewMinus.newCarbs}g K`:'−'+MANUAL_STEP+'g → Minimum erreicht'}
         · +${MANUAL_STEP}g → ${previewPlus.newKcal} kcal / ${previewPlus.newCarbs}g K
      </div>
    </div>
    <div class="ma-btns">
      <button class="ma-btn minus${canReduce?'':' disabled'}" onclick="${canReduce?'manualAdj(-1)':''}">−${MANUAL_STEP}g</button>
      <button class="ma-btn plus" onclick="manualAdj(1)">+${MANUAL_STEP}g</button>
    </div>
  </div>`;

  // ─── PROJECTION ──────────────────────────────────────
  const proj=getProjection();
  if(proj){
    if(proj.date&&isShred){
      const ds=proj.date.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
      const col=proj.onTime?'#2ecc71':'#e74c3c';
      h+=`<div class="proj"><div class="pv" style="color:${col}">${GOAL_KG}kg am ${ds}</div>
        <div class="pd">${proj.onTime?'✓ Vor Deadline':'✗ Nach Deadline'} · ${Math.abs(proj.daysLeft)} Tage · ${proj.rate.toFixed(2)} kg/Woche · aktuell ${proj.currentW.toFixed(1)}kg</div></div>`;
    } else if(proj.rate){
      const col=(!isShred&&proj.rate>0)?'#2ecc71':(isShred&&proj.rate<0)?'#2ecc71':'#e74c3c';
      h+=`<div class="proj"><div class="pv" style="color:${col}">${proj.rate>0?'+':''}${proj.rate.toFixed(2)} kg/Woche</div>
        <div class="pd">Aktuell ${proj.currentW?proj.currentW.toFixed(1):'–'}kg${isShred?` · Ziel ${GOAL_KG}kg`:''}</div></div>`;
    } else if(proj.msg){
      h+=`<div class="proj"><div class="pv" style="color:#f39c12">${proj.msg}</div></div>`;
    }
  }

  // ─── REFEED ──────────────────────────────────────────
  const refeed=shouldRefeed();
  if(refeed){h+=`<div class="refeed-banner"><div class="rv">⚡ REFEED</div><div class="rd">${refeed.msg}</div></div>`}

  // ─── NEXT STEP RECOMMENDATION ────────────────────────
  if(recDir!==0){
    const rec=getRecommendation(recDir);
    const dir=recDir<0?'REDUZIEREN':'ERHÖHEN';
    const col=recDir<0?'#e74c3c':'#3498db';
    h+=`<div class="rec-box" style="border-color:${col}">
      <div class="rec-title" style="color:${col}">→ CARBS ${dir} (${recDir<0?'':'+'}${rec.step}g/Quelle)</div>`;
    rec.lines.forEach(l=>{
      h+=`<div class="rec-line"><span>${l.label}: ${l.food}</span><span><span class="rec-old">${l.oldAmt}${l.unit}</span> → <span class="rec-new" style="color:${col}">${l.newAmt}${l.unit}</span></span></div>`;
    });
    h+=`<div class="rec-line" style="margin-top:4px;border-top:1px solid #1a1a1a;padding-top:4px"><span>Tages-kcal</span><span><span class="rec-old">${rec.oldKcal}</span> → <span class="rec-new" style="color:${col}">${rec.newKcal}</span></span></div>`;
    h+=`<div class="rec-line"><span>Carbs/Tag</span><span><span class="rec-old">${rec.oldCarbs}g</span> → <span class="rec-new" style="color:${col}">${rec.newCarbs}g</span></span></div>`;
    h+=`</div>`;
  }

  // ─── MEALS ───────────────────────────────────────────
  meals.forEach((meal,i)=>{
    h+=`<div class="meal"><div class="mh"><div class="mn">${i+1}. ${meal.name}</div><div class="mm">${meal.macros.kcal} kcal · <span class="cp">P${meal.macros.p}</span> <span class="cf">F${meal.macros.f}</span> <span class="ck">K${meal.macros.k}</span></div></div>`;
    meal.di.forEach(it=>{h+=`<div class="mi"><span>${esc(it.food)}${it.sw?` <button class="swap-btn" onclick="cyc('${it.sw}')">↻</button>`:''}</span><span class="mv">${esc(it.display)}</span></div>`});
    h+=`</div>`;
  });

  // ─── SHOPPING ────────────────────────────────────────
  h+=`<button class="full-btn" onclick="toggleShop()">${S.showShop?'Einkaufsliste ▴':'Einkaufsliste ×5 ▾'}</button>`;
  if(S.showShop){
    const list={};const add=(f,a,u)=>{const k=f+'|'+u;list[k]=list[k]||{food:f,amt:0,unit:u};list[k].amt+=a};
    for(let i=0;i<5;i++){FIXED[0].items.forEach(x=>add(x.food,x.amt,x.unit));FIXED[1].items.forEach(x=>add(x.food,x.amt,x.unit));add(pA.food,pA.amt,pA.unit);add(cA.food,cA.amt,cA.unit);add(VEG3.food,VEG3.amt,VEG3.unit);add(fA.food,fA.amt,fA.unit);add(pB.food,pB.amt,pB.unit);add(cB.food,cB.amt,cB.unit);add(VEG4.food,VEG4.amt,VEG4.unit);add(fB.food,fB.amt,fB.unit)}
    h+=`<div class="shop"><div class="sl">Einkaufsliste — 5 Tage</div>`;
    Object.values(list).sort((a,b)=>a.food.localeCompare(b.food)).forEach(it=>{h+=`<div class="si"><span>${esc(it.food)}</span><span class="sv">${it.amt} ${esc(it.unit)}</span></div>`});
    h+=`</div>`;
  }

  // ─── TRACKER ─────────────────────────────────────────
  h+=`<div class="tracker"><div class="th"><h2>5-Tage Tracker</h2><span style="font-size:12px;color:${adh>=80?'#2ecc71':adh>0?'#e74c3c':'#555'}">${adh}%</span></div>`;

  h+=`<div class="lbl">Gewicht (morgens, nüchtern)</div><div class="wr">`;
  ['T0','T1','T2','T3','T4','T5'].forEach((l,i)=>{h+=`<div class="wi"><span>${l}</span><input type="number" step="0.1" placeholder="kg" value="${esc(S.weights[i])}" oninput="setW(${i},this.value)" onblur="render()"></div>`});
  h+=`</div>`;

  h+=`<div class="lbl">Whoop Recovery %</div><div class="wr">`;
  ['T1','T2','T3','T4','T5'].forEach((l,i)=>{h+=`<div class="wi"><span>${l}</span><input type="number" step="1" min="0" max="100" placeholder="%" value="${esc(S.recovery[i])}" oninput="setR(${i},this.value)" onblur="render()" style="width:46px;${S.recovery[i]!==''?'border-color:'+(parseInt(S.recovery[i])>=50?'#27ae60':'#c0392b'):''}"></div>`});
  h+=`</div>`;

  // Live deltas
  h+=`<div style="margin-bottom:14px">`;
  for(let d=0;d<5;d++){
    const ddd=dd(S.weights[d],S.weights[d+1]);
    const wV=parseFloat(S.weights[d+1]);
    const rec=S.recovery[d]!==''?parseInt(S.recovery[d]):null;
    if(ddd!==null){
      const col=isShred?(parseFloat(ddd)<=0?'#2ecc71':'#e74c3c'):(parseFloat(ddd)>=0?'#2ecc71':'#e74c3c');
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;font-size:10px;color:#555;padding:2px 0 2px 12px;border-left:2px solid ${col}">
        <span>Tag ${d+1}: ${wV.toFixed(1)}kg${rec!==null?` · <span style="color:${rec>=50?'#2ecc71':'#e74c3c'}">${rec}%</span>`:''}</span>
        <span style="color:${col};font-weight:700">${parseFloat(ddd)>0?'+':''}${ddd}kg</span>
      </div>`;
    }
  }
  h+=`</div>`;

  // Check grid
  h+=`<div class="grid"><div></div>${['M1','M2','M3','M4'].map(m=>`<div class="gl">${m}</div>`).join('')}`;
  for(let d=0;d<5;d++){h+=`<div class="gd">T${d+1}</div>`;for(let m=0;m<4;m++){h+=`<button class="gc${S.checks[d][m]?' on':''}" onclick="tgl(${d},${m})">${S.checks[d][m]?'✓':'·'}</button>`}}
  h+=`</div>`;

  // Eval
  if(evalType!=='none'){
    const ecol=evalType==='ok'?'#2ecc71':evalType==='wait'?'#f39c12':evalType==='cut'?'#e74c3c':'#3498db';
    const ebg=evalType==='ok'?'#0a1f0a':evalType==='wait'?'#1f1a0a':evalType==='cut'?'#1f0a0a':'#0a1a1f';
    h+=`<div class="eval" style="background:${ebg};border:1px solid ${ecol}"><div class="ev" style="color:${ecol}">${evalMsg}</div>`;
    if(evalType==='ok')h+=`<div class="ed">→ Weiter mit aktuellen Kalorien. Stall-Counter reset.</div>`;
    else if(evalType==='wait')h+=`<div class="ed">→ Noch 1 Iteration. Bei erneutem Verfehlen → automatische Anpassung.</div>`;
    else if(evalType==='cut')h+=`<div class="ed">→ Wird beim Abschließen automatisch angewendet: −${CARB_STEP}g Carbs/Quelle.</div>`;
    else if(evalType==='add')h+=`<div class="ed">→ Wird beim Abschließen automatisch angewendet: +${CARB_STEP}g Carbs/Quelle.</div>`;
    h+=`</div>`;
  }

  h+=`<textarea placeholder="Notizen..." oninput="setN(this.value)">${esc(S.note)}</textarea>`;
  h+=`<button class="full-btn" onclick="next()" style="background:#1a1a1a">Nächste Iteration →</button>`;
  h+=`<button class="reset-progress" onclick="resetProgress()">Fortschritt zurücksetzen (Verlauf behalten)</button>`;
  h+=`</div>`;

  // ─── CORRELATION ─────────────────────────────────────
  const corr=getCorr();
  if(corr){
    h+=`<div class="corr"><div class="lbl" style="margin-bottom:6px">Whoop × Gewicht</div><div class="cv">`;
    h+=`Ø Recovery: <span style="color:#aaa">${corr.avgAll.toFixed(0)}%</span><br>`;
    if(corr.lc>0&&corr.hc>0){
      h+=`&lt;50%: <span style="color:#e74c3c">${corr.lowAvg.toFixed(2)}kg/Iter</span> (n=${corr.lc})<br>`;
      h+=`≥50%: <span style="color:#2ecc71">${corr.highAvg.toFixed(2)}kg/Iter</span> (n=${corr.hc})<br>`;
    }
    if(corr.totalStalls>0)h+=`Stalls bei niedriger Recovery: <span style="color:#f39c12">${corr.stallsLow}/${corr.totalStalls}</span>`;
    h+=`</div></div>`;
  }

  // ─── HISTORY ─────────────────────────────────────────
  if(S.history.length>0){
    h+=`<div class="history"><h2>Verlauf</h2>`;
    const allW=S.history.flatMap(x=>(x.weights||[]).filter(w=>w!=='').map(Number)).filter(n=>!isNaN(n));
    if(allW.length>=2){
      const mn=Math.min(...allW)-.5,mx=Math.max(...allW)+.5,w=680,hh=80;
      const pts=allW.map((v,i)=>`${(i/(allW.length-1))*w},${hh-((v-mn)/(mx-mn))*hh}`).join(' ');
      h+=`<div class="hl">Gewichtstrend</div><svg viewBox="-4 -4 ${w+8} ${hh+20}" style="width:100%;height:auto;margin-bottom:14px"><polyline points="${pts}" fill="none" stroke="${modeCol}" stroke-width="2"/>`;
      allW.forEach((v,i)=>{h+=`<circle cx="${(i/(allW.length-1))*w}" cy="${hh-((v-mn)/(mx-mn))*hh}" r="3" fill="${modeCol}"/>`});
      h+=`<text x="0" y="${hh+14}" fill="#555" font-size="9" font-family="inherit">${mn.toFixed(1)}</text><text x="${w}" y="${hh+14}" fill="#555" font-size="9" font-family="inherit" text-anchor="end">${mx.toFixed(1)}</text></svg>`;
    }

    [...S.history].reverse().forEach(x=>{
      const isExp=S.expandedIter===x.iteration;
      const modeLabel=x.mode==='bulk'?'B':'S';
      const goalMet=isShred?(x.delta!==null&&parseFloat(x.delta)<=SHRED_TARGET):(x.delta!==null&&parseFloat(x.delta)>=BULK_MIN&&parseFloat(x.delta)<=BULK_MAX);
      const goalCol=goalMet?'#2ecc71':'#e74c3c';
      const avgRec=x.recovery?(()=>{const r=x.recovery.map(Number).filter(n=>!isNaN(n));return r.length?Math.round(r.reduce((a,b)=>a+b,0)/r.length):null})():null;

      h+=`<div class="hi"><div class="hi-head" onclick="toggleHist(${x.iteration})">
        <span><span style="color:${x.mode==='bulk'?'#2ecc71':'#e74c3c'};font-size:9px">${modeLabel}</span> #${x.iteration} — ${x.date}${x.action==='cut'?' ✂':x.action==='add'?' ➕':''}</span>
        <span>
          <span style="color:${goalCol}">${x.delta!==null?(parseFloat(x.delta)>0?'+':'')+x.delta:'–'}kg</span>
          ${goalMet?'<span style="font-size:9px;color:#2ecc71"> ✓</span>':'<span style="font-size:9px;color:#e74c3c"> ✗</span>'}
          ${avgRec!==null?` · <span style="color:${avgRec>=50?'#2ecc71':'#e74c3c'}">${avgRec}%R</span>`:''}
           · ${x.adherence}% · ${x.kcal}kcal${x.carbAdj&&x.carbAdj!==0?` · ${x.carbAdj>0?'+':''}${x.carbAdj}g`:''}
          <span style="color:#333;margin-left:4px">${isExp?'▴':'▾'}</span>
        </span></div>`;

      if(isExp){
        h+=`<div style="padding:0 0 8px 0">`;
        const ws=x.weights||[],recs=x.recovery||[];
        for(let d=0;d<5;d++){
          const ddd=dd(ws[d],ws[d+1]);const wV=parseFloat(ws[d+1]);const rec=recs[d]!==undefined&&recs[d]!==''?parseInt(recs[d]):null;
          if(!isNaN(wV)){
            const col=ddd!==null?(isShred?(parseFloat(ddd)<=0?'#2ecc71':'#e74c3c'):(parseFloat(ddd)>=0?'#2ecc71':'#e74c3c')):'#333';
            h+=`<div class="hi-day" style="border-left-color:${col}"><span style="display:flex;align-items:center;gap:6px"><span class="dot" style="background:${col}"></span>Tag ${d+1}: <span style="color:#aaa">${wV.toFixed(1)}kg</span>${rec!==null?`<span style="color:${rec>=50?'#2ecc71':'#e74c3c'};font-size:9px">${rec}%</span>`:''}</span>
              <span style="color:${col};font-weight:700">${ddd!==null?((parseFloat(ddd)>0?'+':'')+ddd+'kg'):'–'}</span></div>`;
          }
        }
        const tS=parseFloat(ws[0]),tE=parseFloat(ws[5]);
        if(!isNaN(tS)&&!isNaN(tE)){
          const td=(tE-tS).toFixed(1);const tc=goalMet?'#2ecc71':'#e74c3c';
          h+=`<div style="display:flex;justify-content:space-between;font-size:10px;padding:6px 0 2px 12px;border-left:2px solid ${tc};margin-top:4px;color:#888"><span style="font-weight:700">${tS.toFixed(1)} → ${tE.toFixed(1)}kg</span><span style="color:${tc};font-weight:700">${parseFloat(td)>0?'+':''}${td}kg ${goalMet?'✓':'✗'}</span></div>`;
        }
        if(x.note){h+=`<div style="font-size:10px;color:#444;padding:4px 0 0 12px;font-style:italic">${esc(x.note)}</div>`}
        h+=`</div>`;
      }
      h+=`</div>`;
    });
    h+=`</div>`;
  }

  // ─── RULES ───────────────────────────────────────────
  h+=`<div style="background:#0d0d0d;border:1px dashed #1a1a1a;padding:12px 18px;margin-top:16px;font-size:10px;color:#333;line-height:1.6">
    <strong style="color:#444">${isShred?'SHRED':'BULK'} ALGORITHMUS</strong><br>
    ${isShred?`≥0.5kg Verlust/5d → weiter<br>&lt;0.5kg (1×) → abwarten<br>&lt;0.5kg (2×) → −${CARB_STEP}g Carbs/Quelle (auto)<br>4+ on track → Refeed<br>Manuell: ±${MANUAL_STEP}g jederzeit`
    :`+0.15 bis +0.35kg/5d → Sweet Spot<br>&gt;0.35kg (1×) → abwarten, (2×) → −${CARB_STEP}g (auto)<br>&lt;0.15kg (1×) → abwarten, (2×) → +${CARB_STEP}g (auto)<br>Manuell: ±${MANUAL_STEP}g jederzeit`}
  </div>`;
  h+=`<div class="footer"><div class="fr">adj: ${S.carbAdj>0?'+':''}${S.carbAdj}g · stalls: ${S.stallCount}/2${isShred?` · streak: ${S.consecutiveOk}`:''}</div><button onclick="resetAll()">reset all</button></div>`;

  document.getElementById('app').innerHTML=h;
}

// ─── ACTIONS ────────────────────────────────────────────
function cyc(t){const m={pA:['swapPA',PROTEIN_A.length],pB:['swapPB',PROTEIN_B.length],cA:['swapCA',CARB_BASE.length],cB:['swapCB',CARB_BASE.length],fA:['swapFA',FAT_OPT.length],fB:['swapFB',FAT_OPT.length]};const[k,l]=m[t];S[k]=(S[k]+1)%l;scheduleSave();render()}
function toggleShop(){S.showShop=!S.showShop;render()}
let rt=null;
function setW(i,v){S.weights[i]=v;scheduleSave();if(rt)clearTimeout(rt);rt=setTimeout(()=>{const ae=document.activeElement;if(!ae||ae.tagName!=='INPUT')render()},800)}
function setR(i,v){S.recovery[i]=v;scheduleSave();if(rt)clearTimeout(rt);rt=setTimeout(()=>{const ae=document.activeElement;if(!ae||ae.tagName!=='INPUT')render()},800)}
function setN(v){S.note=v;scheduleSave()}
function tgl(d,m){S.checks[d][m]=!S.checks[d][m];scheduleSave();render()}
function toggleHist(iter){S.expandedIter=S.expandedIter===iter?null:iter;render()}

function setMode(m){
  if(m===S.mode)return;
  if(!confirm(`Zu ${m.toUpperCase()} wechseln? Verlauf bleibt, Fortschritt (Stalls, Carb-Adj, Streak) wird zurückgesetzt.`))return;
  S.mode=m;
  S.carbAdj=0;S.stallCount=0;S.consecutiveOk=0;
  S.iteration=1;
  S.checks=Array.from({length:5},()=>Array(4).fill(false));
  S.weights=Array(6).fill("");S.recovery=Array(5).fill("");S.note="";
  scheduleSave();render();
}

function resetProgress(){
  if(!confirm('Fortschritt zurücksetzen? Carb-Adj, Stalls und Streak auf 0. Verlauf bleibt.'))return;
  S.carbAdj=0;S.stallCount=0;S.consecutiveOk=0;
  scheduleSave();render();
}

function next(){
  const sW=parseFloat(S.weights[0]),eW=parseFloat(S.weights[5]);
  const delta=(!isNaN(sW)&&!isNaN(eW))?(eW-sW).toFixed(1):null;
  const dv=delta!==null?parseFloat(delta):null;
  const adh=Math.round(S.checks.flat().filter(Boolean).length/20*100);
  const kcal=getTotals().kcal;
  const isShred=S.mode==='shred';

  let action='ok';

  if(isShred){
    if(delta===null||dv<=SHRED_TARGET){
      S.stallCount=0;S.consecutiveOk++;action='ok';
    } else {
      S.stallCount++;S.consecutiveOk=0;
      if(S.stallCount>=2){S.carbAdj-=CARB_STEP;S.stallCount=0;action='cut'}
      else{action='wait'}
    }
  } else { // bulk
    if(delta===null){action='ok'}
    else if(dv>=BULK_MIN&&dv<=BULK_MAX){
      S.stallCount=0;action='ok';
    } else if(dv>BULK_MAX){
      S.stallCount++;
      if(S.stallCount>=2){S.carbAdj-=CARB_STEP;S.stallCount=0;action='cut'}
      else{action='wait'}
    } else { // too little gain
      S.stallCount++;
      if(S.stallCount>=2){S.carbAdj+=CARB_STEP;S.stallCount=0;action='add'}
      else{action='wait'}
    }
  }

  S.history.push({iteration:S.iteration,mode:S.mode,date:new Date().toISOString().slice(0,10),weights:[...S.weights],recovery:[...S.recovery],delta,adherence:adh,note:S.note,kcal,carbAdj:S.carbAdj,action});
  S.iteration++;
  S.checks=Array.from({length:5},()=>Array(4).fill(false));
  S.weights=Array(6).fill("");S.recovery=Array(5).fill("");S.note="";S.expandedIter=null;
  scheduleSave();render();
  window.scrollTo(0,0);
}

async function resetAll(){
  if(!confirm('ALLES löschen? Verlauf, Einstellungen, komplett.'))return;
  try{await dbDel('state')}catch(e){}
  S=DEFAULT_STATE();render();
}

// ─── INIT ───────────────────────────────────────────────
(async()=>{
  try{const saved=await dbGet('state');if(saved){
    if(!saved.mode)saved.mode='shred';
    if(!saved.recovery)saved.recovery=Array(5).fill("");
    if(saved.consecutiveOk===undefined)saved.consecutiveOk=0;
    if(saved.expandedIter===undefined)saved.expandedIter=null;
    // Migrate from carbCut to carbAdj
    if(saved.carbCut!==undefined&&saved.carbAdj===undefined){saved.carbAdj=-saved.carbCut;delete saved.carbCut}
    if(saved.carbAdj===undefined)saved.carbAdj=0;
    Object.assign(S,saved);
  }}catch(e){}
  render();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('/cut-protocol/sw.js').catch(()=>{});
})();
</script>
