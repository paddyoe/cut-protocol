<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>CUT PROTOCOL</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;-webkit-tap-highlight-color:transparent}
.root{max-width:720px;margin:0 auto;padding:20px;min-height:100vh;padding-bottom:env(safe-area-inset-bottom,20px)}
.header{border-bottom:2px solid #333;padding-bottom:14px;margin-bottom:0}
.header h1{font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.5px;display:inline}
.header .iter{font-size:13px;color:#666;float:right}
.header .meta{font-size:11px;color:#555;margin-top:4px;display:flex;gap:14px;flex-wrap:wrap;clear:both}
/* ── TABS ── */
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid #333}
.tab-btn{flex:1;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;padding:12px 0 10px;font-size:11px;font-weight:700;font-family:inherit;color:#444;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;transition:color .15s,border-color .15s}
.tab-btn.active{color:#fff;border-bottom-color:#fff}
.tab-btn:active{opacity:.7}
/* ── existing styles ── */
.totals{background:#141414;border:1px solid #2a2a2a;padding:14px 18px;margin-bottom:14px;display:flex;justify-content:space-between}
.totals .t{text-align:center}
.totals .tv{font-size:22px;font-weight:700}
.totals .tl{font-size:10px;color:#666;text-transform:uppercase}
.status-bar{background:#111;border:1px solid #222;padding:10px 18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.tag{font-size:10px;padding:3px 8px;font-weight:700;font-family:inherit;border-radius:2px}
.tag-ok{background:#0a1f0a;border:1px solid #2ecc71;color:#2ecc71}
.tag-warn{background:#1f1a0a;border:1px solid #f39c12;color:#f39c12}
.tag-cut{background:#1f0a0a;border:1px solid #e74c3c;color:#e74c3c}
.tag-refeed{background:#0a1a1f;border:1px solid #3498db;color:#3498db}
.meal{background:#111;border:1px solid #222;margin-bottom:10px;padding:14px 18px}
.meal .mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.meal .mn{font-size:14px;font-weight:700;color:#fff}
.meal .mm{font-size:11px;color:#555}
.meal .mi{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#888;padding:3px 0}
.meal .mi+.mi{border-top:1px solid #1a1a1a}
.meal .mv{color:#aaa;font-weight:600;flex-shrink:0}
.swap-btn{background:none;border:1px solid #333;color:#666;font-size:10px;font-family:inherit;padding:1px 5px;cursor:pointer;line-height:1.4;border-radius:2px;margin-left:4px}
.cp{color:#e74c3c}.cf{color:#f39c12}.ck{color:#3498db}
.full-btn{background:#111;border:1px solid #333;color:#888;padding:10px 20px;font-size:12px;font-family:inherit;cursor:pointer;text-transform:uppercase;font-weight:700;width:100%;margin-bottom:10px;margin-top:6px}
.shop{background:#0d0d0d;border:1px dashed #2a2a2a;padding:14px 18px;margin-bottom:12px}
.shop .sl{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.shop .si{display:flex;justify-content:space-between;font-size:12px;color:#777;padding:3px 0;border-bottom:1px solid #151515}
.shop .sv{color:#aaa;font-weight:600}
.tracker{border-top:2px solid #333;padding-top:20px;margin-top:12px}
.tracker h2{font-size:14px;font-weight:700;color:#fff;text-transform:uppercase;margin:0}
.tracker .th{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.lbl{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.wr{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.wr .wi{display:flex;flex-direction:column;align-items:center}
.wr .wi span{font-size:9px;color:#444;margin-bottom:2px}
.wr input{width:54px;background:#141414;border:1px solid #2a2a2a;color:#fff;padding:5px;font-size:12px;font-family:inherit;text-align:center;outline:none}
.grid{display:grid;grid-template-columns:auto repeat(4,1fr);gap:3px;margin-bottom:14px}
.grid .gl{font-size:9px;color:#555;text-align:center;padding:3px 0}
.grid .gd{font-size:11px;color:#666;padding:5px 6px 5px 0}
.grid .gc{padding:5px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:700;border:1px solid #2a2a2a;background:#1a1a1a;color:#333}
.grid .gc.on{background:#2ecc71;border-color:#27ae60;color:#000}
.eval{margin-bottom:10px;padding:14px 18px}
.eval.ok{background:#0a1f0a;border:1px solid #2ecc71}
.eval.no{background:#1f0a0a;border:1px solid #e74c3c}
.eval.wait{background:#1f1a0a;border:1px solid #f39c12}
.eval .ev{font-size:13px;font-weight:700}
.eval .ed{font-size:11px;color:#888;margin-top:4px}
textarea{width:100%;background:#111;border:1px solid #222;color:#aaa;padding:8px;font-size:12px;font-family:inherit;min-height:36px;resize:vertical;outline:none;box-sizing:border-box;margin-top:4px}
.nlp-box{background:#111;border:1px solid #222;padding:10px 14px;margin-bottom:14px}
.nlp-box input{width:100%;background:#141414;border:1px solid #2a2a2a;color:#fff;padding:8px;font-size:12px;font-family:inherit;outline:none;box-sizing:border-box}
.nlp-hint{font-size:9px;color:#333;margin-top:4px}
.proj{background:#111;border:1px solid #222;padding:14px 18px;margin-bottom:14px}
.proj .pv{font-size:16px;font-weight:700}
.proj .pd{font-size:10px;color:#555;margin-top:4px}
.refeed-banner{background:#0a1a1f;border:1px solid #3498db;padding:14px 18px;margin-bottom:14px}
.refeed-banner .rv{font-size:13px;font-weight:700;color:#3498db}
.refeed-banner .rd{font-size:11px;color:#888;margin-top:4px}
.corr{background:#0d0d0d;border:1px solid #1a1a1a;padding:12px 18px;margin-bottom:14px}
.corr .cv{font-size:11px;color:#666;line-height:1.6}
.history{border-top:2px solid #333;padding-top:20px;margin-top:20px}
.history h2{font-size:14px;font-weight:700;color:#fff;text-transform:uppercase;margin:0 0 12px}
.hl{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.hi{font-size:11px;color:#666;border-bottom:1px solid #151515}
.hi-head{display:flex;justify-content:space-between;padding:6px 0;cursor:pointer}
.hi-head:active{opacity:0.7}
.hi-day{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:#555;padding:2px 0 2px 12px;border-left:2px solid #1a1a1a}
.hi-day .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.footer{display:flex;justify-content:space-between;align-items:center;margin-top:24px;border-top:1px solid #1a1a1a;padding-top:12px}
.footer .fr{font-size:10px;color:#333}
.footer button{background:none;border:none;color:#2a2a2a;font-size:10px;font-family:inherit;cursor:pointer;padding:4px 8px}
/* ── MEAL PLAN ── */
.mp-weeknav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mp-weeknav button{background:none;border:1px solid #2a2a2a;color:#555;font-size:12px;font-family:inherit;padding:5px 12px;cursor:pointer}
.mp-weeknav button:disabled{opacity:.25;pointer-events:none}
.mp-weeknav button:active{opacity:.6}
.mp-target{background:#141414;border:1px solid #2a2a2a;padding:10px 14px;margin-bottom:14px;font-size:10px;color:#555;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.mp-day{background:#111;border:1px solid #1a1a1a;margin-bottom:8px}
.mp-day.today{border-color:#333}
.mp-day-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px 8px}
.mp-pbar{height:2px;background:#1a1a1a;margin:0 14px 8px}
.mp-pbar-fill{height:100%;transition:width .3s}
.mp-meals{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:0 14px 10px}
.mp-meal-btn{background:#141414;border:1px solid #2a2a2a;color:#555;padding:8px 10px;font-size:11px;font-family:inherit;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;transition:background .1s,border-color .1s,color .1s}
.mp-meal-btn.checked{background:#0d1f0d;border-color:#27ae60;color:#2ecc71}
.mp-meal-btn:active{opacity:.7}
.mp-day-macros{display:flex;justify-content:space-between;padding:0 14px 10px;font-size:10px;color:#444}
.mp-week-summary{background:#141414;border:1px solid #2a2a2a;padding:14px 18px;margin-top:6px}
</style>
</head>
<body>
<div class="root" id="app"></div>

<script>
// ─── IndexedDB ──────────────────────────────────────────
const DB_NAME='CutProtocolDB',DB_VER=1;
function openDB(){return new Promise((r,j)=>{const q=indexedDB.open(DB_NAME,DB_VER);q.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('kv'))db.createObjectStore('kv')};q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
async function dbGet(k){const db=await openDB();return new Promise((r,j)=>{const t=db.transaction('kv','readonly').objectStore('kv').get(k);t.onsuccess=()=>r(t.result??null);t.onerror=()=>j(t.error)})}
async function dbSet(k,v){const db=await openDB();return new Promise((r,j)=>{const t=db.transaction('kv','readwrite').objectStore('kv').put(v,k);t.onsuccess=()=>r();t.onerror=()=>j(t.error)})}
async function dbDel(k){const db=await openDB();return new Promise((r,j)=>{const t=db.transaction('kv','readwrite').objectStore('kv').delete(k);t.onsuccess=()=>r();t.onerror=()=>j(t.error)})}

// ─── CONFIG ─────────────────────────────────────────────
const START_KG=88.2,GOAL_KG=77,START_KFA=22.9,GOAL_KFA=12;
const DEADLINE=new Date('2026-08-04');

// ─── FOOD DATA ──────────────────────────────────────────
const PROTEIN_A=[
  {food:"Hähnchenbrust",amt:250,unit:"g (roh)",p:55,f:5,k:0,kcal:275},
  {food:"Putenbrust",amt:250,unit:"g (roh)",p:55,f:3,k:0,kcal:250},
  {food:"Thunfisch (Dose)",amt:250,unit:"g",p:55,f:2,k:0,kcal:250}
];
const PROTEIN_B=[
  {food:"Lachs",amt:180,unit:"g (roh)",p:36,f:24,k:0,kcal:370},
  {food:"Forelle",amt:180,unit:"g (roh)",p:36,f:14,k:0,kcal:280},
  {food:"Kabeljau",amt:200,unit:"g (roh)",p:36,f:2,k:0,kcal:165}
];
const CARB_BASE=[
  {food:"Reis",baseAmt:60,unit:"g (roh)",pG:0.07,fG:0.01,kG:0.78,kcG:3.58},
  {food:"Nudeln",baseAmt:60,unit:"g (roh)",pG:0.11,fG:0.02,kG:0.69,kcG:3.56},
  {food:"Kartoffeln",baseAmt:200,unit:"g",pG:0.02,fG:0.001,kG:0.15,kcG:0.73}
];
const FAT_OPT=[
  {food:"Olivenöl",amt:10,unit:"ml",p:0,f:10,k:0,kcal:90},
  {food:"Kokosöl",amt:10,unit:"ml",p:0,f:10,k:0,kcal:90},
  {food:"Butter",amt:10,unit:"g",p:0,f:8,k:0,kcal:75}
];
const FIXED=[
  {name:"Porridge",items:[
    {food:"Haferflocken",amt:50,unit:"g"},
    {food:"Whey Protein",amt:50,unit:"g"},
    {food:"Obst",amt:100,unit:"g"},
    {food:"Lindt 85%",amt:15,unit:"g"},
    {food:"Flohsamenschalen",amt:4,unit:"g"},
    {food:"Mandelmilch",amt:200,unit:"ml"}
  ],macros:{kcal:552,p:49,f:14,k:54}},
  {name:"Skyr Bowl",items:[
    {food:"Skyr",amt:400,unit:"g"},
    {food:"Apfel",amt:1,unit:"Stück"},
    {food:"Leinsamen",amt:10,unit:"g"},
    {food:"Paranuss",amt:10,unit:"g"}
  ],macros:{kcal:474,p:48,f:12,k:41}}
];
const VEG3={food:"Brokkoli",amt:200,unit:"g",p:6,f:0,k:4,kcal:35};
const VEG4={food:"Grüne Bohnen",amt:200,unit:"g",p:4,f:0,k:6,kcal:40};

// ─── STATE ──────────────────────────────────────────────
let S={
  iteration:1,
  activeTab:'protokoll',
  checks:Array.from({length:5},()=>Array(4).fill(false)),
  weights:Array(6).fill(""),
  recovery:Array(5).fill(""),
  note:"",
  history:[],
  swapPA:0,swapPB:0,swapCA:0,swapCB:2,swapFA:0,swapFB:0,
  carbCut:0,stallCount:0,
  consecutiveOk:0,
  showShop:false,
  expandedIter:null,
  // Meal Plan
  mealLog:{},       // {"2026-03-24":[true,false,true,false]}
  mealWeekOffset:0  // 0 = current week, -1 = last week
};
let saveTimer=null;
function scheduleSave(){if(saveTimer)clearTimeout(saveTimer);saveTimer=setTimeout(()=>dbSet('state',S).catch(()=>{}),300)}

// ─── HELPERS ────────────────────────────────────────────
function getCarb(idx,cut){
  const c=CARB_BASE[idx],amt=Math.max(0,c.baseAmt-cut);
  return{food:c.food,amt:Math.round(amt),unit:c.unit,p:Math.round(amt*c.pG),f:Math.round(amt*c.fG),k:Math.round(amt*c.kG),kcal:Math.round(amt*c.kcG)};
}
function mSum(...ii){return ii.reduce((a,b)=>({kcal:a.kcal+b.kcal,p:a.p+b.p,f:a.f+b.f,k:a.k+b.k}),{kcal:0,p:0,f:0,k:0})}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function dayDelta(a,b){const x=parseFloat(a),y=parseFloat(b);return(!isNaN(x)&&!isNaN(y))?(y-x).toFixed(1):null}
function dateKey(d){return d.toISOString().slice(0,10)}

// ─── WEEK HELPERS ────────────────────────────────────────
function getMondayOfWeek(offset){
  const d=new Date();
  const day=d.getDay();
  const mon=new Date(d);
  mon.setDate(d.getDate()-(day===0?6:day-1)+(offset||0)*7);
  mon.setHours(0,0,0,0);
  return mon;
}
function getWeekDays(offset){
  const mon=getMondayOfWeek(offset);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d});
}
function getISOWeek(d){
  const date=new Date(d);date.setHours(0,0,0,0);
  date.setDate(date.getDate()+3-(date.getDay()+6)%7);
  const w1=new Date(date.getFullYear(),0,4);
  return 1+Math.round(((date-w1)/86400000-3+(w1.getDay()+6)%7)/7);
}

// ─── PROJECTION ─────────────────────────────────────────
function getProjection(){
  const pts=[];
  let dayIdx=0;
  S.history.forEach(h=>{(h.weights||[]).forEach(w=>{const v=parseFloat(w);if(!isNaN(v))pts.push({x:dayIdx,y:v});dayIdx++})});
  S.weights.forEach(w=>{const v=parseFloat(w);if(!isNaN(v))pts.push({x:dayIdx,y:v});dayIdx++});
  if(pts.length<3)return null;
  const n=pts.length;
  const sx=pts.reduce((a,p)=>a+p.x,0),sy=pts.reduce((a,p)=>a+p.y,0);
  const sxy=pts.reduce((a,p)=>a+p.x*p.y,0),sxx=pts.reduce((a,p)=>a+p.x*p.x,0);
  const slope=(n*sxy-sx*sy)/(n*sxx-sx*sx);
  const intercept=(sy-slope*sx)/n;
  if(slope>=0)return{msg:"Kein Abwärtstrend erkennbar.",date:null,daysLeft:null,onTime:null,rate:0};
  const lastPt=pts[pts.length-1];
  const daysToGoal=(GOAL_KG-intercept)/slope-lastPt.x;
  const today=new Date();
  const projDate=new Date(today.getTime()+daysToGoal*86400000);
  const weeklyRate=slope*7;
  return{date:projDate,daysLeft:Math.round(daysToGoal),onTime:projDate<=DEADLINE,rate:weeklyRate,currentW:lastPt.y,deadlineDays:Math.ceil((DEADLINE-today)/86400000)};
}

// ─── WHOOP CORRELATION ──────────────────────────────────
function getRecoveryCorrelation(){
  const valid=S.history.filter(h=>h.recovery&&h.recovery.some(r=>r!==''&&r!==null));
  if(valid.length<3)return null;
  const data=valid.map(h=>{
    const recs=h.recovery.map(Number).filter(n=>!isNaN(n));
    const avgRec=recs.length>0?recs.reduce((a,b)=>a+b,0)/recs.length:null;
    const delta=h.delta!==null?parseFloat(h.delta):null;
    return{avgRec,delta};
  }).filter(d=>d.avgRec!==null&&d.delta!==null);
  if(data.length<3)return null;
  const low=data.filter(d=>d.avgRec<50),high=data.filter(d=>d.avgRec>=50);
  const avgLoss=d=>d.length?d.reduce((a,x)=>a+x.delta,0)/d.length:0;
  const stallsWithLowRec=data.filter(d=>d.delta>-0.5&&d.avgRec<50).length;
  const totalStalls=data.filter(d=>d.delta>-0.5).length;
  return{lowAvg:avgLoss(low),highAvg:avgLoss(high),avgRecAll:data.reduce((a,d)=>a+d.avgRec,0)/data.length,stallsWithLowRec,totalStalls,lowCount:low.length,highCount:high.length};
}

// ─── REFEED LOGIC ───────────────────────────────────────
function shouldRefeed(){
  if(S.consecutiveOk>=4)return{reason:'streak',msg:`${S.consecutiveOk} Iterationen in Folge im Defizit. Strategischer Refeed empfohlen — 1 Tag Carbs hoch (Base +100g), Fett runter, Kalorien auf Maintenance (~2600 kcal). Verhindert metabolische Adaption.`};
  const last2=S.history.slice(-2);
  if(last2.length===2&&last2.every(h=>h.adherence<60))return{reason:'adherence',msg:'Adherence unter 60% in den letzten 2 Iterationen. Refeed-Tag kann helfen: psychologischer Reset, Leptin-Boost. 1 Tag Maintenance, dann weiter.'};
  return null;
}

// ─── RENDER PROTOKOLL ───────────────────────────────────
function renderProtokoll(){
  const pA=PROTEIN_A[S.swapPA],pB=PROTEIN_B[S.swapPB];
  const cA=getCarb(S.swapCA,S.carbCut),cB=getCarb(S.swapCB,S.carbCut);
  const fA=FAT_OPT[S.swapFA],fB=FAT_OPT[S.swapFB];
  const m3=mSum(pA,cA,VEG3,fA),m4=mSum(pB,cB,VEG4,fB);
  const meals=[
    {...FIXED[0],di:FIXED[0].items.map(i=>({food:i.food,display:`${i.amt}${i.unit}`}))},
    {...FIXED[1],di:FIXED[1].items.map(i=>({food:i.food,display:`${i.amt}${i.unit}`}))},
    {name:"Deftig I",macros:m3,di:[
      {food:pA.food,display:`${pA.amt}${pA.unit}`,sw:"pA"},
      {food:cA.food,display:`${cA.amt}${cA.unit}`,sw:"cA"},
      {food:VEG3.food,display:`${VEG3.amt}${VEG3.unit}`},
      {food:fA.food,display:`${fA.amt}${fA.unit}`,sw:"fA"}]},
    {name:"Deftig II",macros:m4,di:[
      {food:pB.food,display:`${pB.amt}${pB.unit}`,sw:"pB"},
      {food:cB.food,display:`${cB.amt}${cB.unit}`,sw:"cB"},
      {food:VEG4.food,display:`${VEG4.amt}${VEG4.unit}`},
      {food:fB.food,display:`${fB.amt}${fB.unit}`,sw:"fB"}]}
  ];
  const tot=meals.reduce((a,m)=>({kcal:a.kcal+m.macros.kcal,p:a.p+m.macros.p,f:a.f+m.macros.f,k:a.k+m.macros.k}),{kcal:0,p:0,f:0,k:0});
  const sW=parseFloat(S.weights[0]),eW=parseFloat(S.weights[5]);
  const delta=(!isNaN(sW)&&!isNaN(eW))?(eW-sW).toFixed(1):null;
  const onTrack=delta!==null&&parseFloat(delta)<=-0.5;
  const adh=Math.round(S.checks.flat().filter(Boolean).length/20*100);
  let nextAct=delta===null?'none':onTrack?'ok':S.stallCount>=1?'cut':'wait';

  let h=`
  <div class="totals">
    ${[['kcal',tot.kcal,'#fff'],['Protein',tot.p+'g','#e74c3c'],['Fett',tot.f+'g','#f39c12'],['Carbs',tot.k+'g','#3498db']].map(([l,v,c])=>`<div class="t"><div class="tv" style="color:${c}">${v}</div><div class="tl">${l}</div></div>`).join('')}
  </div>

  <div class="status-bar">
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      ${S.carbCut===0?'<span class="tag tag-ok">BASE CARBS</span>':`<span class="tag tag-cut">−${S.carbCut}g CARBS</span>`}
      ${S.stallCount>0?`<span class="tag tag-warn">STALL ${S.stallCount}/2</span>`:''}
      ${S.consecutiveOk>=3?`<span class="tag tag-ok">🔥 ${S.consecutiveOk} STREAK</span>`:''}
    </div>
    <span style="font-size:10px;color:#444">${cA.food} ${cA.amt}${cA.unit} · ${cB.food} ${cB.amt}${cB.unit}</span>
  </div>`;

  const proj=getProjection();
  if(proj){
    if(proj.date){
      const dateStr=proj.date.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
      const col=proj.onTime?'#2ecc71':'#e74c3c';
      h+=`<div class="proj"><div class="pv" style="color:${col}">${GOAL_KG}kg am ${dateStr}</div><div class="pd">${proj.onTime?'✓ Vor Deadline':'✗ Nach Deadline'} · ${Math.abs(proj.daysLeft)} Tage · ${proj.rate.toFixed(2)} kg/Woche · aktuell ${proj.currentW.toFixed(1)}kg</div></div>`;
    } else {
      h+=`<div class="proj"><div class="pv" style="color:#f39c12">${proj.msg}</div></div>`;
    }
  }

  const refeed=shouldRefeed();
  if(refeed){h+=`<div class="refeed-banner"><div class="rv">⚡ REFEED EMPFEHLUNG</div><div class="rd">${refeed.msg}</div></div>`}

  meals.forEach((meal,i)=>{
    h+=`<div class="meal"><div class="mh"><div class="mn">${i+1}. ${meal.name}</div><div class="mm">${meal.macros.kcal} kcal · <span class="cp">P${meal.macros.p}</span> <span class="cf">F${meal.macros.f}</span> <span class="ck">K${meal.macros.k}</span></div></div>`;
    meal.di.forEach(it=>{h+=`<div class="mi"><span>${esc(it.food)}${it.sw?` <button class="swap-btn" onclick="cyc('${it.sw}')">↻</button>`:''}</span><span class="mv">${esc(it.display)}</span></div>`});
    h+=`</div>`;
  });

  h+=`<button class="full-btn" onclick="toggleShop()">${S.showShop?'Einkaufsliste ausblenden ▴':'Einkaufsliste ×5 ▾'}</button>`;
  if(S.showShop){
    const list={};
    const add=(f,a,u)=>{const k=f+'|'+u;list[k]=list[k]||{food:f,amt:0,unit:u};list[k].amt+=a};
    for(let i=0;i<5;i++){FIXED[0].items.forEach(x=>add(x.food,x.amt,x.unit));FIXED[1].items.forEach(x=>add(x.food,x.amt,x.unit));add(pA.food,pA.amt,pA.unit);add(cA.food,cA.amt,cA.unit);add(VEG3.food,VEG3.amt,VEG3.unit);add(fA.food,fA.amt,fA.unit);add(pB.food,pB.amt,pB.unit);add(cB.food,cB.amt,cB.unit);add(VEG4.food,VEG4.amt,VEG4.unit);add(fB.food,fB.amt,fB.unit)}
    h+=`<div class="shop"><div class="sl">Einkaufsliste — 1 Iteration (5 Tage)</div>`;
    Object.values(list).sort((a,b)=>a.food.localeCompare(b.food)).forEach(it=>{h+=`<div class="si"><span>${esc(it.food)}</span><span class="sv">${it.amt} ${esc(it.unit)}</span></div>`});
    h+=`</div>`;
  }

  h+=`<div class="tracker"><div class="th"><h2>5-Tage Tracker</h2><span style="font-size:12px;color:${adh>=80?'#2ecc71':adh>0?'#e74c3c':'#555'}">${adh}%</span></div>`;

  h+=`<div class="nlp-box"><div class="lbl" style="margin-bottom:4px">Quick Input</div><input type="text" id="nlp-input" placeholder="z.B. 87.4 87.1 86.9 87.0 86.6 86.3" onkeydown="if(event.key==='Enter')parseNLP()"><div style="display:flex;justify-content:space-between;align-items:center"><div class="nlp-hint">6 Werte mit Leerzeichen → T0-T5</div><button onclick="parseNLP()" style="background:none;border:1px solid #333;color:#666;font-size:10px;font-family:inherit;padding:2px 8px;cursor:pointer;margin-top:4px">Parse ↵</button></div></div>`;

  h+=`<div class="lbl">Gewicht (morgens, nüchtern)</div><div class="wr">`;
  ['T0','T1','T2','T3','T4','T5'].forEach((l,i)=>{h+=`<div class="wi"><span>${l}</span><input type="number" step="0.1" placeholder="kg" value="${esc(S.weights[i])}" oninput="setW(${i},this.value)" onblur="render()"></div>`});
  h+=`</div>`;

  h+=`<div class="lbl">Whoop Recovery %</div><div class="wr">`;
  ['T1','T2','T3','T4','T5'].forEach((l,i)=>{h+=`<div class="wi"><span>${l}</span><input type="number" step="1" min="0" max="100" placeholder="%" value="${esc(S.recovery[i])}" oninput="setR(${i},this.value)" onblur="render()" style="width:46px;${S.recovery[i]!==''?'border-color:'+(parseInt(S.recovery[i])>=50?'#27ae60':'#c0392b'):''}"></div>`});
  h+=`</div>`;

  h+=`<div style="margin-bottom:14px">`;
  for(let d=0;d<5;d++){
    const dd=dayDelta(S.weights[d],S.weights[d+1]);
    const wVal=parseFloat(S.weights[d+1]);
    const rec=S.recovery[d]!==''?parseInt(S.recovery[d]):null;
    if(dd!==null){
      const col=parseFloat(dd)<=0?'#2ecc71':'#e74c3c';
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;font-size:10px;color:#555;padding:2px 0 2px 12px;border-left:2px solid ${col}"><span>Tag ${d+1}: ${wVal.toFixed(1)} kg${rec!==null?` · <span style="color:${rec>=50?'#2ecc71':'#e74c3c'}">${rec}%</span>`:''}</span><span style="color:${col};font-weight:700">${parseFloat(dd)>0?'+':''}${dd} kg</span></div>`;
    }
  }
  h+=`</div>`;

  h+=`<div class="grid"><div></div>${['M1','M2','M3','M4'].map(m=>`<div class="gl">${m}</div>`).join('')}`;
  for(let d=0;d<5;d++){h+=`<div class="gd">T${d+1}</div>`;for(let m=0;m<4;m++){h+=`<button class="gc${S.checks[d][m]?' on':''}" onclick="tgl(${d},${m})">${S.checks[d][m]?'✓':'·'}</button>`}}
  h+=`</div>`;

  if(delta!==null){
    if(onTrack) h+=`<div class="eval ok"><div class="ev" style="color:#2ecc71">${delta} kg in 5 Tagen</div><div class="ed">→ On track. Kalorien bleiben. Stall-Counter reset.</div></div>`;
    else if(nextAct==='cut') h+=`<div class="eval no"><div class="ev" style="color:#e74c3c">${delta} kg — 2. Stall</div><div class="ed">→ Nächste Iteration: −30g Carbs/Quelle (${S.carbCut}g → ${S.carbCut+30}g unter Base).</div></div>`;
    else h+=`<div class="eval wait"><div class="ev" style="color:#f39c12">${delta} kg — 1. Stall</div><div class="ed">→ 1 Iteration abwarten. Wenn wieder &lt;0.5kg → automatische Carb-Reduktion.</div></div>`;
  }

  h+=`<textarea placeholder="Notizen..." oninput="setN(this.value)">${esc(S.note)}</textarea>`;
  h+=`<button class="full-btn" onclick="next()" style="background:#1a1a1a">Nächste Iteration →</button></div>`;

  const corr=getRecoveryCorrelation();
  if(corr){
    h+=`<div class="corr"><div class="lbl" style="margin-bottom:6px">Whoop × Gewicht Korrelation</div><div class="cv">Ø Recovery: <span style="color:#aaa">${corr.avgRecAll.toFixed(0)}%</span><br>`;
    if(corr.lowCount>0&&corr.highCount>0){h+=`Recovery &lt;50%: <span style="color:#e74c3c">${corr.lowAvg.toFixed(2)} kg/Iter</span> (n=${corr.lowCount})<br>Recovery ≥50%: <span style="color:#2ecc71">${corr.highAvg.toFixed(2)} kg/Iter</span> (n=${corr.highCount})<br>`}
    if(corr.totalStalls>0){h+=`Stalls mit niedriger Recovery: <span style="color:#f39c12">${corr.stallsWithLowRec}/${corr.totalStalls}</span>`}
    h+=`</div></div>`;
  }

  if(S.history.length>0){
    h+=`<div class="history"><h2>Verlauf</h2>`;
    const allW=S.history.flatMap(x=>(x.weights||[]).filter(w=>w!=='').map(Number)).filter(n=>!isNaN(n));
    if(allW.length>=2){
      const mn=Math.min(...allW)-.5,mx=Math.max(...allW)+.5,w=680,hh=80;
      const pts=allW.map((v,i)=>`${(i/(allW.length-1))*w},${hh-((v-mn)/(mx-mn))*hh}`).join(' ');
      h+=`<div class="hl">Gewichtstrend</div><svg viewBox="-4 -4 ${w+8} ${hh+20}" style="width:100%;height:auto;margin-bottom:14px"><polyline points="${pts}" fill="none" stroke="#e74c3c" stroke-width="2"/>`;
      allW.forEach((v,i)=>{h+=`<circle cx="${(i/(allW.length-1))*w}" cy="${hh-((v-mn)/(mx-mn))*hh}" r="3" fill="#e74c3c"/>`});
      h+=`<text x="0" y="${hh+14}" fill="#555" font-size="9" font-family="inherit">${mn.toFixed(1)}</text><text x="${w}" y="${hh+14}" fill="#555" font-size="9" font-family="inherit" text-anchor="end">${mx.toFixed(1)}</text></svg>`;
    }
    [...S.history].reverse().forEach(x=>{
      const isExp=S.expandedIter===x.iteration;
      const goalMet=x.delta!==null&&parseFloat(x.delta)<=-0.5;
      const goalCol=goalMet?'#2ecc71':'#e74c3c';
      const avgRec=x.recovery?(()=>{const r=x.recovery.map(Number).filter(n=>!isNaN(n));return r.length?Math.round(r.reduce((a,b)=>a+b,0)/r.length):null})():null;
      h+=`<div class="hi"><div class="hi-head" onclick="toggleHist(${x.iteration})"><span>#${x.iteration} — ${x.date}${x.action==='cut'?' ✂':''}</span><span><span style="color:${goalCol}">${x.delta??'–'}kg</span>${goalMet?'<span style="color:#2ecc71;font-size:9px"> ✓</span>':'<span style="color:#e74c3c;font-size:9px"> ✗</span>'}${avgRec!==null?` · <span style="color:${avgRec>=50?'#2ecc71':'#e74c3c'}">${avgRec}%R</span>`:''} · ${x.adherence}% · ${x.kcal}kcal${x.carbCut>0?` · −${x.carbCut}g`:''}<span style="color:#333;margin-left:4px">${isExp?'▴':'▾'}</span></span></div>`;
      if(isExp){
        h+=`<div style="padding:0 0 8px 0">`;
        const ws=x.weights||[],recs=x.recovery||[];
        for(let d=0;d<5;d++){
          const dd=dayDelta(ws[d],ws[d+1]),wVal=parseFloat(ws[d+1]);
          const rec=recs[d]!==undefined&&recs[d]!==''?parseInt(recs[d]):null;
          if(!isNaN(wVal)){
            const col=dd!==null?(parseFloat(dd)<=0?'#2ecc71':'#e74c3c'):'#333';
            h+=`<div class="hi-day" style="border-left-color:${col}"><span style="display:flex;align-items:center;gap:6px"><span class="dot" style="background:${col}"></span>Tag ${d+1}: <span style="color:#aaa">${wVal.toFixed(1)} kg</span>${rec!==null?`<span style="color:${rec>=50?'#2ecc71':'#e74c3c'};font-size:9px">${rec}%</span>`:''}</span><span style="color:${col};font-weight:700">${dd!==null?((parseFloat(dd)>0?'+':'')+dd+' kg'):'–'}</span></div>`;
          }
        }
        const tS=parseFloat(ws[0]),tE=parseFloat(ws[5]);
        if(!isNaN(tS)&&!isNaN(tE)){
          const td=(tE-tS).toFixed(1),tc=parseFloat(td)<=-0.5?'#2ecc71':'#e74c3c';
          h+=`<div style="display:flex;justify-content:space-between;font-size:10px;padding:6px 0 2px 12px;border-left:2px solid ${tc};margin-top:4px;color:#888"><span style="font-weight:700">Gesamt: ${tS.toFixed(1)} → ${tE.toFixed(1)} kg</span><span style="color:${tc};font-weight:700">${parseFloat(td)>0?'+':''}${td} kg ${parseFloat(td)<=-0.5?'✓':'✗'}</span></div>`;
        }
        if(x.note){h+=`<div style="font-size:10px;color:#444;padding:4px 0 0 12px;font-style:italic">${esc(x.note)}</div>`}
        h+=`</div>`;
      }
      h+=`</div>`;
    });
    h+=`</div>`;
  }

  h+=`<div style="background:#0d0d0d;border:1px dashed #1a1a1a;padding:12px 18px;margin-top:16px;font-size:10px;color:#333;line-height:1.6"><strong style="color:#444">REGELN</strong><br>≥0.5kg/5d → weiter, Stall reset<br>&lt;0.5kg (1×) → abwarten<br>&lt;0.5kg (2×) → −30g Carbs/Quelle<br>4+ Iterationen on track → Refeed-Empfehlung</div>`;
  h+=`<div class="footer"><div class="fr">carbCut: ${S.carbCut}g · stalls: ${S.stallCount}/2 · streak: ${S.consecutiveOk}</div><button onclick="resetAll()">reset all</button></div>`;
  return h;
}

// ─── RENDER MAHLZEITEN ──────────────────────────────────
function renderMahlzeiten(){
  const pA=PROTEIN_A[S.swapPA],pB=PROTEIN_B[S.swapPB];
  const cA=getCarb(S.swapCA,S.carbCut),cB=getCarb(S.swapCB,S.carbCut);
  const fA=FAT_OPT[S.swapFA],fB=FAT_OPT[S.swapFB];
  const m3=mSum(pA,cA,VEG3,fA),m4=mSum(pB,cB,VEG4,fB);

  const MEAL_DEFS=[
    {name:"Porridge",    macros:FIXED[0].macros},
    {name:"Skyr Bowl",   macros:FIXED[1].macros},
    {name:"Deftig I",    macros:m3},
    {name:"Deftig II",   macros:m4}
  ];
  const target=MEAL_DEFS.reduce((a,m)=>({kcal:a.kcal+m.macros.kcal,p:a.p+m.macros.p,f:a.f+m.macros.f,k:a.k+m.macros.k}),{kcal:0,p:0,f:0,k:0});

  const offset=S.mealWeekOffset||0;
  const days=getWeekDays(offset);
  const today=dateKey(new Date());
  const kw=getISOWeek(days[0]);
  const weekLabel=`KW ${kw} · ${days[0].toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})} – ${days[6].toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'})}`;

  let h=``;

  // Week nav
  h+=`<div class="mp-weeknav">
    <button onclick="shiftWeek(-1)">◀</button>
    <span style="font-size:11px;color:#555">${weekLabel}</span>
    <button onclick="shiftWeek(1)" ${offset>=0?'disabled':''}>▶</button>
  </div>`;

  // Daily target bar
  h+=`<div class="mp-target">
    <span style="color:#888;font-weight:700">Tagesziel</span>
    <span style="color:#fff">${target.kcal} kcal</span>
    <span class="cp">P ${target.p}g</span>
    <span class="cf">F ${target.f}g</span>
    <span class="ck">K ${target.k}g</span>
    ${S.carbCut>0?`<span style="color:#e74c3c;font-size:9px">−${S.carbCut}g Carbs aktiv</span>`:''}
  </div>`;

  // Days
  const DAY_NAMES=['Mo','Di','Mi','Do','Fr','Sa','So'];
  days.forEach((day,di)=>{
    const dk=dateKey(day);
    const checked=(S.mealLog&&S.mealLog[dk])?S.mealLog[dk]:[false,false,false,false];
    const isToday=dk===today;
    const isFuture=new Date(dk)>new Date(today);
    const dayName=DAY_NAMES[di];
    const dayDate=day.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});

    const eaten=checked.reduce((a,c,i)=>c?{kcal:a.kcal+MEAL_DEFS[i].macros.kcal,p:a.p+MEAL_DEFS[i].macros.p,f:a.f+MEAL_DEFS[i].macros.f,k:a.k+MEAL_DEFS[i].macros.k}:a,{kcal:0,p:0,f:0,k:0});
    const checkedCount=checked.filter(Boolean).length;
    const anyChecked=checkedCount>0;
    const allChecked=checkedCount===4;
    const pct=Math.round(eaten.kcal/target.kcal*100);
    const pctCol=pct>=95?'#2ecc71':pct>50?'#f39c12':'#e74c3c';

    h+=`<div class="mp-day${isToday?' today':''}">
      <div class="mp-day-head">
        <div>
          <span style="font-size:13px;font-weight:700;color:${isToday?'#fff':isFuture?'#333':'#777'}">${dayName}</span>
          <span style="font-size:11px;color:#333;margin-left:6px">${dayDate}</span>
          ${isToday?`<span style="font-size:9px;color:#555;margin-left:6px;padding:1px 5px;border:1px solid #2a2a2a">HEUTE</span>`:''}
        </div>
        <div style="text-align:right;font-size:10px">
          ${anyChecked
            ?`<span style="color:${pctCol}">${eaten.kcal} kcal <span style="color:#333">/</span> ${pct}%</span>`
            :`<span style="color:#222">–</span>`}
        </div>
      </div>`;

    // Progress bar
    if(anyChecked){
      h+=`<div class="mp-pbar"><div class="mp-pbar-fill" style="width:${Math.min(pct,100)}%;background:${pctCol}"></div></div>`;
    }

    // 2×2 meal grid
    h+=`<div class="mp-meals">`;
    MEAL_DEFS.forEach((meal,i)=>{
      const isChecked=checked[i];
      h+=`<button class="mp-meal-btn${isChecked?' checked':''}" onclick="toggleMeal('${dk}',${i})">
        <span style="display:flex;align-items:center;gap:5px">
          <span style="font-size:9px;width:10px">${isChecked?'✓':''}</span>
          <span>${meal.name}</span>
        </span>
        <span style="font-size:9px;color:${isChecked?'#2ecc71':'#2a2a2a'}">${meal.macros.kcal}</span>
      </button>`;
    });
    h+=`</div>`;

    // Macro breakdown when anything eaten
    if(anyChecked){
      h+=`<div class="mp-day-macros">
        <span class="cp">P ${eaten.p}<span style="color:#2a2a2a">/${target.p}g</span></span>
        <span class="cf">F ${eaten.f}<span style="color:#2a2a2a">/${target.f}g</span></span>
        <span class="ck">K ${eaten.k}<span style="color:#2a2a2a">/${target.k}g</span></span>
        <span style="color:${allChecked?'#2ecc71':'#333'}">${checkedCount}/4 ${allChecked?'✓':''}</span>
      </div>`;
    }
    h+=`</div>`;
  });

  // Weekly summary
  const weekTotals=days.reduce((acc,day)=>{
    const dk=dateKey(day);
    const checked=(S.mealLog&&S.mealLog[dk])?S.mealLog[dk]:[false,false,false,false];
    const eaten=checked.reduce((a,c,i)=>c?{kcal:a.kcal+MEAL_DEFS[i].macros.kcal,p:a.p+MEAL_DEFS[i].macros.p,meals:a.meals+1}:a,{kcal:0,p:0,meals:0});
    return{kcal:acc.kcal+eaten.kcal,p:acc.p+eaten.p,meals:acc.meals+eaten.meals};
  },{kcal:0,p:0,meals:0});

  const weekAdh=Math.round(weekTotals.meals/28*100);
  const adhCol=weekAdh>=80?'#2ecc71':weekAdh>50?'#f39c12':'#e74c3c';

  h+=`<div class="mp-week-summary">
    <div class="lbl" style="margin-bottom:10px">Woche</div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:22px;font-weight:700;color:${adhCol}">${weekAdh}%</div>
        <div style="font-size:10px;color:#444;margin-top:2px">${weekTotals.meals} / 28 Mahlzeiten</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:13px;font-weight:700;color:#888">${weekTotals.kcal.toLocaleString('de')} kcal</div>
        <div style="font-size:10px;color:#444;margin-top:2px">Ø ${Math.round(weekTotals.kcal/7)} kcal/Tag</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:13px;font-weight:700;color:#e74c3c">${weekTotals.p}g</div>
        <div style="font-size:10px;color:#444;margin-top:2px">Protein gesamt</div>
      </div>
    </div>
  </div>`;

  // Footer
  h+=`<div class="footer"><div class="fr">meal log: ${Object.keys(S.mealLog||{}).length} Tage</div><button onclick="resetAll()">reset all</button></div>`;
  return h;
}

// ─── RENDER (main) ──────────────────────────────────────
function render(){
  const tab=S.activeTab||'protokoll';
  let h=`<div class="header"><h1>CUT PROTOCOL</h1><span class="iter">#${S.iteration}</span><div class="meta"><span>${START_KG}kg → ${GOAL_KG}kg</span><span>${START_KFA}% → ${GOAL_KFA}% KFA</span><span>Deadline 04.08.2026</span></div></div>`;

  h+=`<div class="tabs">
    <button class="tab-btn${tab==='protokoll'?' active':''}" onclick="setTab('protokoll')">PROTOKOLL</button>
    <button class="tab-btn${tab==='mahlzeiten'?' active':''}" onclick="setTab('mahlzeiten')">MAHLZEITEN</button>
  </div>`;

  h+=(tab==='protokoll')?renderProtokoll():renderMahlzeiten();
  document.getElementById('app').innerHTML=h;
}

// ─── ACTIONS ────────────────────────────────────────────
function setTab(t){S.activeTab=t;scheduleSave();render();window.scrollTo(0,0)}
function cyc(t){const m={pA:['swapPA',PROTEIN_A.length],pB:['swapPB',PROTEIN_B.length],cA:['swapCA',CARB_BASE.length],cB:['swapCB',CARB_BASE.length],fA:['swapFA',FAT_OPT.length],fB:['swapFB',FAT_OPT.length]};const[k,l]=m[t];S[k]=(S[k]+1)%l;scheduleSave();render()}
function toggleShop(){S.showShop=!S.showShop;render()}

function toggleMeal(dk,i){
  if(!S.mealLog)S.mealLog={};
  if(!S.mealLog[dk])S.mealLog[dk]=[false,false,false,false];
  S.mealLog[dk][i]=!S.mealLog[dk][i];
  scheduleSave();render();
}
function shiftWeek(dir){
  S.mealWeekOffset=Math.min(0,(S.mealWeekOffset||0)+dir);
  scheduleSave();render();
}

let renderTimer=null;
function setW(i,v){S.weights[i]=v;scheduleSave();if(renderTimer)clearTimeout(renderTimer);renderTimer=setTimeout(()=>{const ae=document.activeElement;if(!ae||ae.tagName!=='INPUT'||ae.type!=='number')render()},800)}
function setR(i,v){S.recovery[i]=v;scheduleSave();if(renderTimer)clearTimeout(renderTimer);renderTimer=setTimeout(()=>{const ae=document.activeElement;if(!ae||ae.tagName!=='INPUT'||ae.type!=='number')render()},800)}
function setN(v){S.note=v;scheduleSave()}
function tgl(d,m){S.checks[d][m]=!S.checks[d][m];scheduleSave();render()}
function toggleHist(iter){S.expandedIter=S.expandedIter===iter?null:iter;render()}

function parseNLP(){
  const el=document.getElementById('nlp-input');if(!el)return;
  const nums=el.value.trim().split(/[\s,;]+/).map(s=>parseFloat(s.replace(',','.'))).filter(n=>!isNaN(n));
  if(nums.length>=1){for(let i=0;i<Math.min(nums.length,6);i++){S.weights[i]=nums[i].toString()}scheduleSave();render()}
}

function next(){
  const sW=parseFloat(S.weights[0]),eW=parseFloat(S.weights[5]);
  const delta=(!isNaN(sW)&&!isNaN(eW))?(eW-sW).toFixed(1):null;
  const adh=Math.round(S.checks.flat().filter(Boolean).length/20*100);
  const cA=getCarb(S.swapCA,S.carbCut),cB=getCarb(S.swapCB,S.carbCut);
  const kcal=[FIXED[0].macros,FIXED[1].macros,mSum(PROTEIN_A[S.swapPA],cA,VEG3,FAT_OPT[S.swapFA]),mSum(PROTEIN_B[S.swapPB],cB,VEG4,FAT_OPT[S.swapFB])].reduce((a,m)=>a+m.kcal,0);
  let action='ok';
  const lost=delta!==null?parseFloat(delta):0;
  if(delta===null||lost<=-0.5){S.stallCount=0;S.consecutiveOk++;action='ok'}
  else{S.stallCount++;S.consecutiveOk=0;if(S.stallCount>=2){S.carbCut+=30;S.stallCount=0;action='cut'}else{action='wait'}}
  S.history.push({iteration:S.iteration,date:new Date().toISOString().slice(0,10),weights:[...S.weights],recovery:[...S.recovery],delta,adherence:adh,note:S.note,kcal,carbCut:S.carbCut,action});
  S.iteration++;
  S.checks=Array.from({length:5},()=>Array(4).fill(false));
  S.weights=Array(6).fill("");S.recovery=Array(5).fill("");S.note="";S.expandedIter=null;
  scheduleSave();render();window.scrollTo(0,0);
}

async function resetAll(){
  if(!confirm('Alle Daten unwiderruflich löschen?'))return;
  try{await dbDel('state')}catch(e){}
  S={iteration:1,activeTab:'protokoll',checks:Array.from({length:5},()=>Array(4).fill(false)),weights:Array(6).fill(""),recovery:Array(5).fill(""),note:"",history:[],swapPA:0,swapPB:0,swapCA:0,swapCB:2,swapFA:0,swapFB:0,carbCut:0,stallCount:0,consecutiveOk:0,showShop:false,expandedIter:null,mealLog:{},mealWeekOffset:0};
  render();
}

// ─── INIT ───────────────────────────────────────────────
(async()=>{
  try{const saved=await dbGet('state');if(saved){
    if(!saved.recovery)saved.recovery=Array(5).fill("");
    if(saved.consecutiveOk===undefined)saved.consecutiveOk=0;
    if(saved.expandedIter===undefined)saved.expandedIter=null;
    if(!saved.activeTab)saved.activeTab='protokoll';
    if(!saved.mealLog)saved.mealLog={};
    if(saved.mealWeekOffset===undefined)saved.mealWeekOffset=0;
    Object.assign(S,saved);
  }}catch(e){}
  render();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('/cut-protocol/sw.js').catch(()=>{});
})();
</script>
